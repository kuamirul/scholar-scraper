services:
  - type: web
    name: scholar-scraper
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PROXY_MODE
        value: free   # "free" = FreeProxies (no cost) | "tor" = local Tor | "off" = direct
